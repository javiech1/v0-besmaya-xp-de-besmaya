<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2B5EA7"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#C0C0C0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Monitor body -->
    <rect x="12" y="6" width="72" height="54" rx="4" fill="url(#body)" stroke="#888" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="18" y="12" width="60" height="40" rx="2" fill="url(#screen)"/>
    <!-- Screen shine -->
    <rect x="20" y="14" width="56" height="18" rx="1" fill="#fff" opacity="0.15"/>
    <!-- Windows logo on screen -->
    <rect x="38" y="24" width="8" height="8" rx="1" fill="#FF0000" opacity="0.8"/>
    <rect x="48" y="24" width="8" height="8" rx="1" fill="#00AA00" opacity="0.8"/>
    <rect x="38" y="34" width="8" height="8" rx="1" fill="#0066CC" opacity="0.8"/>
    <rect x="48" y="34" width="8" height="8" rx="1" fill="#FFB800" opacity="0.8"/>
    <!-- Power button -->
    <circle cx="48" cy="56" r="2" fill="#4CAF50"/>
    <!-- Stand -->
    <rect x="36" y="62" width="24" height="6" rx="1" fill="#B0B0B0" stroke="#888" stroke-width="1"/>
    <!-- Base -->
    <rect x="26" y="68" width="44" height="6" rx="2" fill="url(#body)" stroke="#888" stroke-width="1"/>
    <!-- Keyboard -->
    <rect x="14" y="78" width="68" height="12" rx="3" fill="url(#body)" stroke="#888" stroke-width="1"/>
    <rect x="18" y="80" width="60" height="8" rx="1" fill="#D8D8D8"/>
    <!-- Key rows -->
    <line x1="22" y1="82" x2="74" y2="82" stroke="#BBB" stroke-width="0.5"/>
    <line x1="22" y1="84" x2="74" y2="84" stroke="#BBB" stroke-width="0.5"/>
    <line x1="22" y1="86" x2="74" y2="86" stroke="#BBB" stroke-width="0.5"/>
  </g>
</svg>
