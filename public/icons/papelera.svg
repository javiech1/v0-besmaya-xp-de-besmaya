<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D0D0D0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- Bin body -->
    <path d="M26 30 L30 84 Q30 88 34 88 L62 88 Q66 88 66 84 L70 30 Z" fill="url(#bin)" stroke="#777" stroke-width="1.5"/>
    <!-- Vertical lines on bin -->
    <line x1="36" y1="36" x2="37" y2="82" stroke="#888" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="36" x2="48" y2="82" stroke="#888" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="36" x2="59" y2="82" stroke="#888" stroke-width="1.5" opacity="0.5"/>
    <!-- Lid -->
    <rect x="22" y="22" width="52" height="8" rx="2" fill="url(#lid)" stroke="#777" stroke-width="1.5"/>
    <!-- Handle -->
    <rect x="40" y="14" width="16" height="10" rx="3" fill="none" stroke="#777" stroke-width="2"/>
    <!-- Recycle arrows -->
    <g transform="translate(48,58)" opacity="0.3">
      <path d="M-8,-10 A12,12 0 0,1 8,-10" fill="none" stroke="#4A4" stroke-width="2.5"/>
      <path d="M8,-10 L5,-6 L11,-7" fill="#4A4"/>
      <path d="M8,10 A12,12 0 0,1 -8,10" fill="none" stroke="#4A4" stroke-width="2.5"/>
      <path d="M-8,10 L-5,6 L-11,7" fill="#4A4"/>
    </g>
  </g>
</svg>
