<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bubbleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8D4F0"/>
      <stop offset="100%" stop-color="#7EB4E2"/>
    </linearGradient>
    <linearGradient id="smileyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Speech bubble (background, top-right) -->
  <g filter="url(#shadow)">
    <path d="
      M 30,6
      L 82,6
      Q 90,6 90,14
      L 90,46
      Q 90,54 82,54
      L 56,54
      L 44,66
      L 46,54
      L 36,54
      Q 30,54 30,46
      Z
    " fill="url(#bubbleGrad)" stroke="#5A8BBF" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Shine -->
    <path d="
      M 33,9
      L 80,9
      Q 87,9 87,14
      L 87,28
      Q 60,32 33,28
      Z
    " fill="#FFFFFF" opacity="0.35"/>
    <!-- Text lines -->
    <rect x="40" y="18" width="38" height="2.5" rx="1.2" fill="#FFFFFF" opacity="0.85"/>
    <rect x="40" y="25" width="30" height="2.5" rx="1.2" fill="#FFFFFF" opacity="0.85"/>
    <rect x="40" y="32" width="34" height="2.5" rx="1.2" fill="#FFFFFF" opacity="0.85"/>
    <rect x="40" y="39" width="22" height="2.5" rx="1.2" fill="#FFFFFF" opacity="0.65"/>
  </g>

  <!-- Yellow smiley character (foreground, bottom-left, MSN style) -->
  <g filter="url(#shadow)">
    <!-- Head -->
    <circle cx="28" cy="62" r="22" fill="url(#smileyGrad)" stroke="#D49400" stroke-width="1.5"/>
    <!-- Shine on head -->
    <ellipse cx="22" cy="52" rx="10" ry="8" fill="#FFFFFF" opacity="0.3"/>
    <!-- Left eye -->
    <ellipse cx="20" cy="58" rx="3" ry="3.5" fill="#1A1A1A"/>
    <ellipse cx="19.5" cy="57" rx="1" ry="1.2" fill="#FFFFFF"/>
    <!-- Right eye -->
    <ellipse cx="36" cy="58" rx="3" ry="3.5" fill="#1A1A1A"/>
    <ellipse cx="35.5" cy="57" rx="1" ry="1.2" fill="#FFFFFF"/>
    <!-- Smile -->
    <path d="M 18,68 Q 28,78 38,68" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="14" cy="66" r="3" fill="#FF9966" opacity="0.35"/>
    <circle cx="42" cy="66" r="3" fill="#FF9966" opacity="0.35"/>
  </g>
</svg>
