<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Monitor / screen -->
  <rect x="6" y="6" width="36" height="26" rx="2" fill="#1C54C2" stroke="#0A246A" stroke-width="1.5"/>
  <rect x="9" y="9" width="30" height="20" fill="#000088"/>
  <!-- Corridor perspective lines inside screen -->
  <line x1="24" y1="11" x2="11" y2="27" stroke="#4488FF" stroke-width="0.8"/>
  <line x1="24" y1="11" x2="37" y2="27" stroke="#4488FF" stroke-width="0.8"/>
  <line x1="24" y1="11" x2="24" y2="27" stroke="#4488FF" stroke-width="0.6" stroke-dasharray="2,2"/>
  <!-- Player block -->
  <rect x="21" y="23" width="6" height="4" fill="#FF6600" stroke="#7A2F00" stroke-width="0.5"/>
  <!-- Obstacle -->
  <rect x="14" y="14" width="5" height="4" fill="#ECE9D8" stroke="#888" stroke-width="0.5"/>
  <rect x="14" y="14" width="5" height="1.5" fill="#D4380A"/>
  <!-- Stand -->
  <rect x="20" y="32" width="8" height="3" fill="#A09898"/>
  <rect x="16" y="35" width="16" height="2" rx="1" fill="#A09898"/>
</svg>
