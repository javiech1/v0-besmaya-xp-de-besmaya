name: Nadie Twitter Bot

on:
  # Cada 30 minutos
  schedule:
    - cron: "*/30 * * * *"
  # Manual desde el navegador (pestaña Actions > Run workflow)
  workflow_dispatch:

# Solo un ciclo a la vez
concurrency:
  group: nadie-bot
  cancel-in-progress: false

permissions:
  contents: write  # Para guardar estado via git

jobs:
  bot-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: twitter-bot/package-lock.json

      - name: Install dependencies
        working-directory: twitter-bot
        run: npm ci

      - name: Build
        working-directory: twitter-bot
        run: npm run build

      # Restaurar estado del bot del ultimo ciclo
      - name: Restore bot state
        uses: actions/cache/restore@v4
        with:
          path: twitter-bot/bot-state.json
          key: nadie-bot-state
          restore-keys: |
            nadie-bot-state

      # Ejecutar un ciclo del bot
      - name: Run bot cycle
        working-directory: twitter-bot
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_BOT_USERNAME: ${{ secrets.TWITTER_BOT_USERNAME }}
          TWITTER_BAND_USERNAME: ${{ secrets.TWITTER_BAND_USERNAME }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POLLING_INTERVAL_MS: "0"
          MAX_DAILY_REPLIES: "100"
          DRY_RUN: ${{ secrets.DRY_RUN || 'false' }}
          RUN_ONCE: "true"
        run: node dist/index.js

      # Borrar cache anterior para poder guardar con la misma key
      - name: Delete old bot state cache
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache delete nadie-bot-state --repo ${{ github.repository }} || true

      # Guardar estado para el siguiente ciclo
      - name: Save bot state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: twitter-bot/bot-state.json
          key: nadie-bot-state
