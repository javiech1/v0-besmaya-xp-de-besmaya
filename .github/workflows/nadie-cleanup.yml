name: Cleanup Bot Replies

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: twitter-bot/package-lock.json

      - name: Install dependencies
        working-directory: twitter-bot
        run: npm ci

      - name: Build
        working-directory: twitter-bot
        run: npm run build

      - name: Run cleanup
        working-directory: twitter-bot
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_BOT_USERNAME: ${{ secrets.TWITTER_BOT_USERNAME }}
          TWITTER_BAND_USERNAME: ${{ secrets.TWITTER_BAND_USERNAME }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node dist/cleanup.js
